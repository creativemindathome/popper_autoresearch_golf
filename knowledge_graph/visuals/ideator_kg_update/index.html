<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ideator → Knowledge Graph (Update Animation)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">Ideator → Reviewer → Knowledge Graph</div>
          <div class="brand-subtitle">Animated “what got added, linked, and reviewed”</div>
        </div>

        <div class="controls">
          <button class="btn" id="btnPlay" type="button">Play</button>
          <button class="btn" id="btnPause" type="button">Pause</button>
          <button class="btn" id="btnPrev" type="button">Prev</button>
          <button class="btn" id="btnNext" type="button">Next</button>

          <div class="speed">
            <label for="speed">Speed</label>
            <input id="speed" type="range" min="0.5" max="2.5" step="0.1" value="1" />
            <div class="speed-val" id="speedVal">1.0×</div>
          </div>

          <button class="btn btn-secondary" id="btnLoad" type="button">Load timeline.json…</button>
          <input id="fileInput" type="file" accept=".json,application/json" hidden />
        </div>
      </header>

      <main class="main">
        <section class="stage">
          <div class="stage-inner">
            <canvas id="graph" class="graph"></canvas>
            <div id="tooltip" class="tooltip hidden"></div>

            <div class="watermark">
              <div class="pill">Ideator</div>
              <div class="arrow">→</div>
              <div class="pill">Reviewer</div>
              <div class="arrow">→</div>
              <div class="pill">Graph</div>
            </div>
          </div>
        </section>

        <aside class="side">
          <div class="card">
            <div class="kicker">Step</div>
            <div class="step-title" id="stepTitle">—</div>
            <div class="step-subtitle" id="stepSubtitle"></div>
            <div class="meta-row">
              <div class="meta">
                <div class="kicker">Index</div>
                <div id="stepIndex">—</div>
              </div>
              <div class="meta">
                <div class="kicker">Duration</div>
                <div id="stepDuration">—</div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="kicker">Notes</div>
            <div class="notes" id="stepNotes">Load a `timeline.json` to begin.</div>
          </div>

          <div class="card legend">
            <div class="kicker">Legend</div>
            <div class="legend-grid">
              <div class="legend-item">
                <span class="dot root"></span><span>Root</span>
              </div>
              <div class="legend-item">
                <span class="dot branch"></span><span>Branch</span>
              </div>
              <div class="legend-item">
                <span class="dot leaf"></span><span>Leaf</span>
              </div>
              <div class="legend-item">
                <span class="dot idea pending"></span><span>Idea (pending)</span>
              </div>
              <div class="legend-item">
                <span class="dot idea approved"></span><span>Idea (approved)</span>
              </div>
              <div class="legend-item">
                <span class="dot idea revise"></span><span>Idea (revise)</span>
              </div>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <!-- Optional: generated by the builder for “open the HTML directly” mode. -->
    <script src="./timeline.inline.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
