ate at fixed computational depth, but different tokens likely require different amounts of processing. This architecture implements 'Dynamic Depth Routing' where each token can adaptively choose how many layers to pass through based on a learned confidence score. Early layers contain lightweight 'routing gates' that predict whether a token needs more processing. Tokens with high confidence scores can 'exit early' through skip connections, while uncertain tokens continue through deeper layers.\n\nThe key insight is that not all tokens are created equal - simple function words like 'the' or 'and' may need minimal processing, while complex concepts require deep reasoning. By allowing tokens to dynamically choose their computational path, we can maintain model capacity for hard examples while dramatically reducing average compute. The routing mechanism uses a small MLP that predicts processing difficulty and routes accordingly, trained end-to-end with a sparsity penalty to encourage early exits.", "train_gpt_code": "import torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport math\nimport time\n\nclass DynamicDepthAttention(nn.Module):\n    def __init__(self, d_model, n_heads, dropout=0.1):\n        super().__init__()\n        self.d_model = d_model\n        self.n_heads = n_heads\n        self.head_dim = d_model // n_heads\n        \n        self.q_proj = nn.Linear(d_model, d_model)\n        self.k_proj = nn.Linear(d_model, d_model)\n        self.v_proj = nn.Linear(d_model, d_model)\n        self.out_proj = nn.Linear(d_model, d_model)\n        self.dropout = nn.Dropout(dropout)\n        \n    def forward(self, x, mask=None):\n        B, T, C = x.shape\n        \n        q = self.q_proj(x).view(B, T, self.n_heads, self.head_dim).transpose(1, 2)\n        k = self.k_proj(x).view(B, T, self.n_heads, self.head_dim).transpose(1, 2)\n        v = self.v_proj(x).view(B, T, self.n_heads, self.head_dim).transpose(1, 2)\n        \n        attn = (q @ k.transpose(-2, -1)) / math.sqrt(self.head_dim)\n        if mask is not None:\n            attn.masked_fill_(mask == 0, float('-inf'))\n        attn = F.softmax(attn, dim=-1)\n        attn = self.dropout(attn)\n        \n        out = (attn @ v).transpose(1, 2).contiguous().view(B, T, C)\n        return self.out_proj(out)\n\nclass RoutingGate(nn.Module):\n    def __init__(self, d_model, threshold=0.5):\n        super().__init__()\n        self.gate = nn.Sequential(\n            nn.Linear(d_model, d_model // 4),\n            nn.ReLU(),\n            nn.Linear(d_model // 4, 1),\n            nn.Sigmoid()\n        )\n        self.threshold = threshold\n        \n    def forward(self, x):\n        # x: (B, T, d_model)\n        confidence = self.gate(x)  # (B, T, 1)\n        should_continue = (confidence < self.threshold).float()\n        return confidence, should_continue\n\nclass DynamicDepthBlock(nn.Module):\n    def __init__(self, d_model, n_heads, d_ff, dropout=0.1, is_exit_layer=False):\n        super().__init__()\n        self.attn = DynamicDepthAttention(d_model, n_heads, dropout)\n        self.ln1 = nn.LayerNorm(d_model)\n        self.ln2 = nn.LayerNorm(d_model)\n        \n        self.ff = nn.Sequential(\n            nn.Linear(d_model, d_ff),\n            nn.ReLU(),\n            nn.Dropout(dropout),\n            nn.Linear(d_ff, d_model),\n            nn.Dropout(dropout)\n        )\n        \n        self.router = RoutingGate(d_model) if not is_exit_layer else None\n        self.is_exit_layer = is_exit_layer\n        \n    def forward(self, x, mask=None, routing_info=None):\n        # x: (B, T, d_model)\n        # routing_info: dict with 'active_mask' indicating which tokens are still processing\n        \n        if routing_info is not None:\n            active_mask = routing_info['active_mask']  # (B, T, 1)\n        else:\n            active_mask = torch.ones_like(x[:, :, :1])\n            \n        # Only process active tokens\n        residual = x\n        x = self.ln1(x)\n        x = self.attn(x, mask)\n        x = residual + x * active_mask  # Only update active tokens\n        \n        residual = x\n        x = self.ln2(x)\n        x = self.ff(x)\n        x = residual + x * active_mask\n        \n        # Routing decision\n        if self.router is not None and not self.is_exit_layer:\n            confidence, should_continue = self.router(x)\n            new_active_mask = active_mask * should_continue\n            routing_info = {\n                'active_mask': new_active_mask,\n                'confidence': confidence,\n                'exit_tokens': active_mask - new_active_mask\n            }\n        else:\n            routing_info = {'active_mask': active_mask}\n            \n        return x, routing_info\n\nclass DynamicDepthTransformer(nn.Module):\n    def __init__(self, vocab_size, d_model=512, n_heads=8, n_layers=12, d_ff=2048, max_len=1024, dropout=0.1):\n        super().__init__()\n        self.d_model = d_model\n        self.n_layers = n_layers\n        \n        self.token_emb = nn.Embedding(vocab_size, d_model)\n        self.pos_emb = nn.Embedding(max_len, d_model)\n        \n        self.blocks = nn.ModuleList([\n            DynamicDepthBlock(d_model, n_heads, d_ff, dropout, is_exit_layer=(i == n_layers-1))\n            for i in range(n_layers)\n        ])\n        \n        self.ln_f = nn.LayerNorm(d_model)\n        self.head = nn.Linear(d_model, vocab_size, bias=False)\n        \n        # Sparsity penalty weight\n        self.sparsity_weight = 0.01\n        \n        self.apply(self._init_weights)\n        \n    def _init_weights(self, module):\n        if isinstance(module, nn.Linear):\n            torch.nn.init.normal_(module.weight, mean=0.0, std=0.02)\n            if module.bias is not None:\n                torch.nn.init.zeros_(module.bias)\n        elif isinstance(module, nn.Embedding):\n            torch.nn.init.normal_(module.weight, mean=0.0, std=0.02)\n            \n    def forward(self, x, targets=N rds exit early while content words use full depth. Routing confidence scores should correlate with token complexity/rarity."}, "stage1_result": {"verdict": "REFUTED", "killed_by": "T2", "kill_reason": "Estimated training time 14843.4s exceeds limit 720.0s (600s * 1.2)", "tags": [], "t2_budget": {"status": "FAIL_FATAL", "test_id": "T2", "estimated_params": 17046016, "estimated_artifact_bytes": 10235894, "budget_remaining_bytes": 6541322, "budget_utilization": 0.6101068258285522, "flops_ratio": 1.0, "estimated_training_seconds": 14843.406974976, "kill_reason": "Estimated training time 14843.4s exceeds limit 720.0s (600s * 1.2)", "tags": [], "wall_seconds": 0.006008750002365559, "attn_flops_ratio": 0.6545454545454545, "mlp_flops_ratio": 0.32727272727272727, "embed_flops_ratio": 0.01818181818181818, "architectural_balance_score": 0.0}, "t3_compilation": null, "t4_signal": null, "t5_init": null, "t7_microtrain": null}, "stage2_input": null, "stage2_result": null, "verdict": "REFUTED", "kill_hypotheses": [], "experiments_run": 0, "error": null}}}];
        
        // Base knowledge graph structure (matching seed KG style)
        const baseNodes = [
            // Roots
            {id: "root_pipeline", label: "Data Pipeline", type: "RootBox", x: 200, y: 80, color: "#3b82f6"},
            {id: "root_network", label: "Neural Network", type: "RootBox", x: 500, y: 80, color: "#ef4444"},
            {id: "root_training", label: "Training", type: "RootBox", x: 800, y: 80, color: "#22c55e"},
            
            // Branches
            {id: "branch_data", label: "Data", type: "Branch", x: 150, y: 200, color: "#4ce5cc"},
            {id: "branch_arch", label: "Architecture", type: "Branch", x: 450, y: 200, color: "#e5d64c"},
            {id: "branch_train", label: "Optimization", type: "Branch", x: 750, y: 200, color: "#e59e4c"},
            
            // Leaves (representing specific concepts)
            {id: "leaf_web", label: "Web Text", type: "Leaf", x: 100, y: 320, color: "#98a8e5"},
            {id: "leaf_code", label: "Code", type: "Leaf", x: 200, y: 320, color: "#b398e5"},
            {id: "leaf_attn", label: "Attention", type: "Leaf", x: 400, y: 320, color: "#e598a7"},
            {id: "leaf_ffn", label: "FFN", type: "Leaf", x: 500, y: 320, color: "#98e5aa"},
            {id: "leaf_opt", label: "Optimizer", type: "Leaf", x: 700, y: 320, color: "#b3e598"},
            {id: "leaf_loss", label: "Loss", type: "Leaf", x: 800, y: 320, color: "#e498e5"},
        ];
        
        const baseLinks = [
            {source: "root_pipeline", target: "branch_data"},
            {source: "root_network", target: "branch_arch"},
            {source: "root_training", target: "branch_train"},
            {source: "branch_data", target: "leaf_web"},
            {source: "branch_data", target: "leaf_code"},
            {source: "branch_arch", target: "leaf_attn"},
            {source: "branch_arch", target: "leaf_ffn"},
            {source: "branch_train", target: "leaf_opt"},
            {source: "branch_train", target: "leaf_loss"},
        ];

        // Hypothesis nodes (will be added dynamically)
        let hypothesisNodes = [];
        let hypothesisLinks = [];
        
        // Set up SVG
        const svg = d3.select("#graph-svg")
            .attr("width", "100%")
            .attr("height", "100%");
        
        const width = document.getElementById('graph-area').clientWidth;
        const height = document.getElementById('graph-area').clientHeight;
        svg.attr("viewBox", `0 0 ${width} ${height}`);
        
        const g = svg.append("g");
        
        // Scale base structure to fit
        const scaleX = width / 1000;
        const scaleY = height / 450;
        const scale = Math.min(scaleX, scaleY) * 0.9;
        const offsetX = (width - 1000 * scale) / 2;
        const offsetY = (height - 450 * scale) / 2;
        
        baseNodes.forEach(n => {
            n.sx = n.x * scale + offsetX;
            n.sy = n.y * scale + offsetY;
        });
        
        // Draw base links
        const linkElements = g.selectAll(".link")
            .data(baseLinks)
            .enter()
            .append("line")
            .attr("class", "link")
            .attr("x1", d => baseNodes.find(n => n.id === d.source).sx)
            .attr("y1", d => baseNodes.find(n => n.id === d.source).sy)
            .attr("x2", d => baseNodes.find(n => n.id === d.target).sx)
            .attr("y2", d => baseNodes.find(n => n.id === d.target).sy);
        
        // Draw base nodes
        const baseNodeElements = g.selectAll(".base-node")
            .data(baseNodes)
            .enter()
            .append("g")
            .attr("class", "base-node")
            .attr("transform", d => `translate(${d.sx}, ${d.sy})`);
        
        baseNodeElements.append("circle")
            .attr("r", d => d.type === "RootBox" ? 30 : d.type === "Branch" ? 20 : 12)
            .attr("class", d => `node-${d.type.toLowerCase()}`)
            .attr("fill", d => d.color);
        
        baseNodeElements.append("text")
            .attr("class", d => `node-label ${d.type === "RootBox" ? "root" : ""}`)
            .attr("dy", d => d.type === "RootBox" ? 45 : d.type === "Branch" ? 35 : 25)
            .text(d => d.label);
        
        // Hypothesis layer
        const hypothesisG = g.append("g").attr("class", "hypothesis-layer");
        
        // Animation state
        let currentEvent = 0;
        let isPlaying = false;
        let animationInterval;
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function logEvent(msg, type) {
            const log = document.getElementById('event-log');
            const div = document.createElement('div');
            div.className = `event-item event-${type}`;
            div.textContent = msg;
            log.insertBefore(div, log.firstChild);
            if (log.children.length > 10) log.removeChild(log.lastChild);
        }
        
        function updateStats() {
            const generated = hypothesisNodes.length;
            const running = hypothesisNodes.filter(n => n.status === 'running').length;
            const killed = hypothesisNodes.filter(n => n.status === 'killed').length;
            const passed = hypothesisNodes.filter(n => n.status === 'passed').length;
            
            document.getElementById('stat-generated').textContent = generated;
            document.getElementById('stat-running').textContent = running;
            document.getElementById('stat-killed').textContent = killed;
            document.getElementById('stat-passed').textContent = passed;
        }
        
        function renderEvent(index) {
            if (index >= events.length) return;
            
            const event = events[index];
            document.getElementById('current-time').textContent = formatTime(event.time);
            document.getElementById('timeline-slider').value = index;
            
            if (event.type === 'generate') {
                // Add new hypothesis node
                const branch = baseNodes.find(n => n.type === "Branch" && n.id.includes("arch"));
                const angle = (hypothesisNodes.length * 0.5) - 1;
                const radius = 120;
                const hx = branch.sx + Math.cos(angle) * radius;
                const hy = branch.sy + Math.sin(angle) * radius + 80;
                
                const node = {
                    id: `hyp_${event.hypothesis}`,
                    label: `H${event.hypothesis}`,
                    fullId: event.theory_id,
                    x: hx,
                    y: hy,
                    status: 'pending',
                    hypothesis: event.hypothesis
                };
                hypothesisNodes.push(node);
                
                const link = {source: branch.id, target: node.id, type: 'hypothesis'};
                hypothesisLinks.push(link);
                
                // Draw link
                hypothesisG.append("line")
                    .attr("class", "link-hypothesis")
                    .attr("x1", branch.sx)
                    .attr("y1", branch.sy)
                    .attr("x2", hx)
                    .attr("y2", hy)
                    .attr("id", `link_${node.id}`);
                
                // Draw node
                const nodeG = hypothesisG.append("g")
                    .attr("class", "hypothesis-node")
                    .attr("transform", `translate(${hx}, ${hy})`)
                    .attr("id", node.id);
                
                nodeG.append("circle")
                    .attr("r", 18)
                    .attr("class", "node-hypothesis")
                    .attr("fill", "#dbeafe");
                
                nodeG.append("text")
                    .attr("class", "node-label")
                    .attr("dy", 30)
                    .text(node.label);
                
                logEvent(`Generated H${event.hypothesis}: ${event.theory_id.substring(0, 30)}...`, 'generate');
                
            } else if (event.type === 'stage1_start') {
                const node = hypothesisNodes.find(n => n.hypothesis === event.hypothesis);
                if (node) {
                    node.status = 'running';
                    d3.select(`#${node.id} circle`)
                        .attr("class", "node-hypothesis running");
                }
                
            } else if (event.type === 'stage1_kill') {
                const node = hypothesisNodes.find(n => n.hypothesis === event.hypothesis);
                if (node) {
                    node.status = 'killed';
                    d3.select(`#${node.id} circle`)
                        .transition()
                        .duration(500)
                        .attr("class", "node-hypothesis killed");
                    
                    logEvent(`Killed H${event.hypothesis}: ${event.details.kill_reason?.substring(0, 40) || 'Stage 1 failed'}...`, 'kill');
                }
                
            } else if (event.type === 'stage2_start') {
                const node = hypothesisNodes.find(n => n.hypothesis === event.hypothesis);
                if (node) {
                    node.status = 'running';
                    d3.select(`#${node.id} circle`)
                        .attr("class", "node-hypothesis running");
                }
                
            } else if (event.type === 'stage2_pass') {
                const node = hypothesisNodes.find(n => n.hypothesis === event.hypothesis);
                if (node) {
                    node.status = 'passed';
                    d3.select(`#${node.id} circle`)
                        .transition()
                        .duration(500)
                        .attr("class", "node-hypothesis passed");
                    
                    logEvent(`H${event.hypothesis} passed Stage 2!`, 'pass');
                }
            }
            
            updateStats();
        }
        
        function play() {
            if (isPlaying) return;
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸ Pause';
            document.getElementById('play-btn').classList.add('playing');
            
            animationInterval = setInterval(() => {
                if (currentEvent < events.length) {
                    renderEvent(currentEvent);
                    currentEvent++;
                } else {
                    stop();
                }
            }, 1500);
        }
        
        function stop() {
            isPlaying = false;
            clearInterval(animationInterval);
            document.getElementById('play-btn').textContent = '▶ Play Evolution';
            document.getElementById('play-btn').classList.remove('playing');
        }
        
        function reset() {
            stop();
            currentEvent = 0;
            hypothesisNodes = [];
            hypothesisLinks = [];
            hypothesisG.selectAll("*").remove();
            document.getElementById('event-log').innerHTML = 'Ready to play...';
            document.getElementById('current-time').textContent = '00:00';
            document.getElementById('timeline-slider').value = 0;
            updateStats();
        }
        
        function goToEvent(index) {
            stop();
            reset();
            for (let i = 0; i <= index && i < events.length; i++) {
                renderEvent(i);
            }
            currentEvent = index + 1;
        }
        
        // Controls
        document.getElementById('play-btn').addEventListener('click', () => {
            if (isPlaying) stop(); else play();
        });
        
        document.getElementById('timeline-slider').addEventListener('input', (e) => {
            goToEvent(parseInt(e.target.value));
        });
        
        // Initialize
        updateStats();
    </script>
